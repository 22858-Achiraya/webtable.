<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 ระบบเก็บข้อมูลส่วนบุคคล</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] },
                    colors: { dark: '#0f172a', darkCard: '#1e293b', brand: '#8b5cf6' }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        /* เอฟเฟกต์ไฟเรืองแสง */
        .glow-border { border: 1px solid rgba(139, 92, 246, 0.3); box-shadow: 0 0 15px rgba(139, 92, 246, 0.1); }
        .glow-border:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); border-color: rgba(139, 92, 246, 0.6); }
        /* สกอร์บาร์เท่ๆ */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }
        /* ตอนพิมพ์ไม่ให้เห็นปุ่ม */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; color: black; }
            .bg-darkCard { background-color: white !important; border: 1px solid #ddd; }
        }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 bg-darkCard p-5 rounded-2xl glow-border">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-cyan-400">
                <i class="fa-solid fa-id-card mr-2 text-purple-400"></i> ระบบเก็บข้อมูลส่วนบุคคล
            </h1>
            <div class="flex gap-2 no-print">
                <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition duration-200">
                    <i class="fa-solid fa-print mr-1"></i> พิมพ์ PDF
                </button>
                <button onclick="exportToCSV()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg transition duration-200">
                    <i class="fa-solid fa-file-excel mr-1"></i> CSV
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-darkCard p-6 rounded-2xl glow-border flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-sm">ข้อมูลทั้งหมด (Total)</p>
                    <h2 id="statTotal" class="text-3xl font-bold text-white mt-1">0</h2>
                </div>
                <div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 text-xl"><i class="fa-solid fa-users"></i></div>
            </div>
            <div class="bg-darkCard p-6 rounded-2xl glow-border flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-sm">ใช้งานอยู่ (Active)</p>
                    <h2 id="statActive" class="text-3xl font-bold text-green-400 mt-1">0</h2>
                </div>
                <div class="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center text-green-400 text-xl"><i class="fa-solid fa-check"></i></div>
            </div>
            <div class="bg-darkCard p-6 rounded-2xl glow-border flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-sm">ปิดใช้งาน (Inactive)</p>
                    <h2 id="statInactive" class="text-3xl font-bold text-red-400 mt-1">0</h2>
                </div>
                <div class="w-12 h-12 rounded-full bg-red-500/20 flex items-center justify-center text-red-400 text-xl"><i class="fa-solid fa-xmark"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="space-y-6 lg:col-span-1 no-print">
                <div class="bg-darkCard p-6 rounded-2xl glow-border">
                    <h3 class="text-lg font-semibold mb-4 text-slate-200">สัดส่วนสถานะ</h3>
                    <div class="h-48 relative"><canvas id="statusChart"></canvas></div>
                </div>

                <div class="bg-darkCard p-6 rounded-2xl glow-border">
                    <h3 class="text-lg font-semibold mb-4 text-brand" id="formTitle"><i class="fa-solid fa-bolt mr-2"></i> จัดการข้อมูล</h3>
                    <div class="space-y-4">
                        <input type="text" id="nameInput" placeholder="ชื่อ - นามสกุล" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-brand focus:ring-1 focus:ring-brand outline-none transition">
                        <input type="email" id="emailInput" placeholder="อีเมล" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-brand focus:ring-1 focus:ring-brand outline-none transition">
                        <input type="text" id="phoneInput" placeholder="เบอร์โทรศัพท์" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-brand focus:ring-1 focus:ring-brand outline-none transition">
                        <select id="statusInput" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-brand outline-none transition">
                            <option value="Active">🟢 Active</option>
                            <option value="Inactive">🔴 Inactive</option>
                            <option value="Pending">🟡 Pending</option>
                        </select>
                        <div class="flex gap-2 pt-2">
                            <button onclick="saveData()" id="saveBtn" class="flex-1 bg-brand hover:bg-purple-600 text-white font-medium py-3 rounded-lg shadow-lg shadow-brand/30 transition duration-300">
                                บันทึก
                            </button>
                            <button onclick="cancelEdit()" id="cancelBtn" class="hidden bg-slate-700 hover:bg-slate-600 text-white font-medium py-3 px-4 rounded-lg transition duration-300">
                                <i class="fa-solid fa-rotate-left"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 bg-darkCard p-6 rounded-2xl glow-border flex flex-col h-full">
                <div class="flex justify-between items-center mb-4 no-print">
                    <h3 class="text-lg font-semibold text-slate-200">ฐานข้อมูล (Database)</h3>
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-3 text-slate-400"></i>
                        <input type="text" id="searchInput" placeholder="ค้นหา..." class="bg-slate-800 border border-slate-700 rounded-full pl-9 pr-4 py-2 text-white focus:border-brand outline-none transition w-48 md:w-64">
                    </div>
                </div>
                
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="text-slate-400 border-b border-slate-700">
                            <tr>
                                <th class="p-3 cursor-pointer hover:text-white transition" onclick="sortData('name')">ชื่อ <i class="fa-solid fa-sort ml-1 text-xs"></i></th>
                                <th class="p-3 cursor-pointer hover:text-white transition" onclick="sortData('email')">ติดต่อ <i class="fa-solid fa-sort ml-1 text-xs"></i></th>
                                <th class="p-3 cursor-pointer hover:text-white transition" onclick="sortData('status')">สถานะ <i class="fa-solid fa-sort ml-1 text-xs"></i></th>
                                <th class="p-3 text-center no-print">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-800/50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataList = JSON.parse(localStorage.getItem('myUltimateTable')) || [];
        let editingId = null;
        let chartInstance = null;
        let currentSort = { key: 'name', asc: true };

        // 1. ฟังก์ชัน Render หลัก (ตาราง + สถิติ + กราฟ)
        function renderDashboard(searchTerm = '') {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            // ระบบค้นหา
            let filteredData = dataList.filter(data => 
                data.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                data.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
                data.phone.includes(searchTerm)
            );

            // ระบบเรียงลำดับ (Sorting)
            filteredData.sort((a, b) => {
                let valA = a[currentSort.key].toLowerCase();
                let valB = b[currentSort.key].toLowerCase();
                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });

            if (filteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-500">ไม่พบข้อมูล</td></tr>`;
            } else {
                filteredData.forEach(data => {
                    let statusColor = data.status === 'Active' ? 'text-green-400 bg-green-400/10 border-green-400/20' : 
                                      data.status === 'Inactive' ? 'text-red-400 bg-red-400/10 border-red-400/20' : 
                                      'text-yellow-400 bg-yellow-400/10 border-yellow-400/20';

                    tableBody.innerHTML += `
                        <tr class="hover:bg-slate-800/50 transition">
                            <td class="p-3 font-medium">${data.name}</td>
                            <td class="p-3 text-sm text-slate-400">
                                <div>${data.email}</div>
                                <div>${data.phone}</div>
                            </td>
                            <td class="p-3">
                                <span class="px-2.5 py-1 rounded-md border text-xs font-semibold ${statusColor}">${data.status}</span>
                            </td>
                            <td class="p-3 text-center no-print">
                                <button onclick="editData(${data.id})" class="text-slate-400 hover:text-brand mx-1 transition"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="deleteData(${data.id})" class="text-slate-400 hover:text-red-500 mx-1 transition"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
            }

            updateStatsAndChart();
        }

        // เรียงลำดับเมื่อคลิกหัวตาราง
        function sortData(key) {
            if (currentSort.key === key) { currentSort.asc = !currentSort.asc; } 
            else { currentSort.key = key; currentSort.asc = true; }
            renderDashboard(document.getElementById('searchInput').value);
        }

        // อัปเดตการ์ดสถิติและกราฟ
        function updateStatsAndChart() {
            let active = dataList.filter(d => d.status === 'Active').length;
            let inactive = dataList.filter(d => d.status === 'Inactive').length;
            let pending = dataList.filter(d => d.status === 'Pending').length;

            // อัปเดตตัวเลข
            document.getElementById('statTotal').innerText = dataList.length;
            document.getElementById('statActive').innerText = active;
            document.getElementById('statInactive').innerText = inactive;

            // อัปเดตกราฟ
            if (chartInstance) chartInstance.destroy(); // ลบกราฟเก่าก่อนวาดใหม่
            const ctx = document.getElementById('statusChart').getContext('2d');
            
            // ป้องกันกราฟว่างเปล่าถ้ายังไม่มีข้อมูล
            if(dataList.length === 0) {
                active = 1; inactive = 0; pending = 0; // Fake data ให้เห็นเป็นวงกลมเทา
                Chart.defaults.color = '#475569';
            } else {
                Chart.defaults.color = '#94a3b8';
            }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Inactive', 'Pending'],
                    datasets: [{
                        data: dataList.length === 0 ? [1,0,0] : [active, inactive, pending],
                        backgroundColor: dataList.length === 0 ? ['#334155'] : ['#4ade80', '#f87171', '#facc15'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: '#cbd5e1' } } },
                    cutout: '70%'
                }
            });
        }

        // ระบบค้นหา
        document.getElementById('searchInput').addEventListener('input', e => renderDashboard(e.target.value));

        // 2. ฟังก์ชันจัดการข้อมูล (Save / Edit / Delete)
        function saveData() {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const status = document.getElementById('statusInput').value;

            if (!name || !email || !phone) return Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรอกข้อมูลให้ครบนะ!', background: '#1e293b', color: '#fff' });

            if (!editingId) {
                dataList.push({ id: Date.now(), name, email, phone, status });
                toastAlert('เพิ่มข้อมูลเรียบร้อย', 'success');
            } else {
                const index = dataList.findIndex(d => d.id === editingId);
                dataList[index] = { id: editingId, name, email, phone, status };
                toastAlert('อัปเดตข้อมูลแล้ว', 'success');
                cancelEdit();
            }
            saveAndRender();
        }

        function editData(id) {
            const data = dataList.find(d => d.id === id);
            editingId = id;
            document.getElementById('nameInput').value = data.name;
            document.getElementById('emailInput').value = data.email;
            document.getElementById('phoneInput').value = data.phone;
            document.getElementById('statusInput').value = data.status;
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen text-yellow-400 mr-2"></i> แก้ไขข้อมูล';
            document.getElementById('cancelBtn').classList.remove('hidden');
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('nameInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('phoneInput').value = '';
            document.getElementById('statusInput').value = 'Active';
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-bolt mr-2"></i> จัดการข้อมูล';
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function deleteData(id) {
            Swal.fire({
                title: 'ลบข้อมูล?', text: "ลบแล้วกู้คืนไม่ได้นะ!", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#475569',
                background: '#1e293b', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    dataList = dataList.filter(d => d.id !== id);
                    if (editingId === id) cancelEdit();
                    saveAndRender();
                    toastAlert('ลบข้อมูลแล้ว', 'error');
                }
            })
        }

        // ฟังก์ชันเสริม
        function saveAndRender() {
            localStorage.setItem('myUltimateTable', JSON.stringify(dataList));
            cancelEdit();
            renderDashboard(document.getElementById('searchInput').value);
        }

        const toastAlert = (title, icon) => {
            Swal.fire({ toast: true, position: 'top-end', icon: icon, title: title, showConfirmButton: false, timer: 2000, background: '#1e293b', color: '#fff' });
        }

        function exportToCSV() {
            if (dataList.length === 0) return toastAlert('ไม่มีข้อมูลให้โหลด', 'info');
            let csvContent = "\uFEFFชื่อ-นามสกุล,อีเมล,เบอร์โทรศัพท์,สถานะ\n"; 
            dataList.forEach(row => csvContent += `"${row.name}","${row.email}","${row.phone}","${row.status}"\n`);
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
            link.download = "dashboard_data.csv";
            link.click();
        }

        // เริ่มต้นทำงาน
        renderDashboard();
    </script>
</body>
</html>
