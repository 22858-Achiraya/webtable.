<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 ระบบเก็บข้อมูลส่วนบุคคล</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(135deg, #fbcfe8 0%, #e9d5ff 50%, #bfdbfe 100%);
            background-attachment: fixed;
        }
        /* กล่องแบบกระจกน่ารักๆ */
        .cute-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.1);
        }
        .cute-glass:hover {
            box-shadow: 0 15px 35px rgba(236, 72, 153, 0.2);
        }
        /* อนิเมชันปุ่มเด้งๆ */
        .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-bounce:hover { transform: translateY(-3px) scale(1.02); }
        
        /* ซ่อนตอนปริ้นท์ */
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .cute-glass { background: white; border: 1px solid #fce7f3; box-shadow: none; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen text-gray-700">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 cute-glass p-6 rounded-[2rem]">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 flex items-center gap-2">
                🎀 ระบบเก็บข้อมูลส่วนบุคคล ✨
            </h1>
            <div class="flex gap-3 no-print">
                <button onclick="window.print()" class="btn-bounce bg-white text-pink-500 border-2 border-pink-200 hover:bg-pink-50 px-5 py-2.5 rounded-full font-medium">
                    <i class="fa-solid fa-print mr-1"></i> ปริ้นท์
                </button>
                <button onclick="exportToCSV()" class="btn-bounce bg-gradient-to-r from-pink-400 to-purple-400 text-white shadow-lg shadow-pink-200 px-5 py-2.5 rounded-full font-medium">
                    <i class="fa-solid fa-heart mr-1"></i> โหลด CSV
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="cute-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-gray-500 font-medium">เพื่อนทั้งหมด 🌸</p>
                    <h2 id="statTotal" class="text-4xl font-bold text-purple-600 mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-purple-100 flex items-center justify-center text-purple-500 text-2xl shadow-inner"><i class="fa-solid fa-users"></i></div>
            </div>
            <div class="cute-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-gray-500 font-medium">สถานะปกติ 💖</p>
                    <h2 id="statActive" class="text-4xl font-bold text-pink-500 mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-pink-100 flex items-center justify-center text-pink-500 text-2xl shadow-inner"><i class="fa-solid fa-face-smile-wink"></i></div>
            </div>
            <div class="cute-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-gray-500 font-medium">สถานะอื่นๆ ☁️</p>
                    <h2 id="statInactive" class="text-4xl font-bold text-blue-500 mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center text-blue-500 text-2xl shadow-inner"><i class="fa-solid fa-mug-hot"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="space-y-6 lg:col-span-1 no-print">
                <div class="cute-glass p-6 rounded-[2rem]">
                    <h3 class="text-xl font-bold mb-5 text-pink-500" id="formTitle"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i> เพิ่มข้อมูลใหม่</h3>
                    <div class="space-y-4">
                        <input type="text" id="nameInput" placeholder="ชื่อ - นามสกุล" class="w-full bg-white/60 border-2 border-pink-100 rounded-2xl p-3.5 focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition">
                        <input type="email" id="emailInput" placeholder="อีเมลติดต่อ" class="w-full bg-white/60 border-2 border-pink-100 rounded-2xl p-3.5 focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition">
                        <input type="text" id="phoneInput" placeholder="เบอร์โทรศัพท์" class="w-full bg-white/60 border-2 border-pink-100 rounded-2xl p-3.5 focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition">
                        <select id="statusInput" class="w-full bg-white/60 border-2 border-pink-100 rounded-2xl p-3.5 focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition text-gray-600">
                            <option value="Active">💖 ปกติ (Active)</option>
                            <option value="Pending">🌟 รอคิว (Pending)</option>
                            <option value="Inactive">💤 พักก่อน (Inactive)</option>
                        </select>
                        <div class="flex gap-3 pt-3">
                            <button onclick="saveData()" id="saveBtn" class="btn-bounce flex-1 bg-gradient-to-r from-pink-400 to-rose-400 text-white font-semibold py-3.5 rounded-2xl shadow-lg shadow-pink-200">
                                บันทึกข้อมูล
                            </button>
                            <button onclick="cancelEdit()" id="cancelBtn" class="hidden btn-bounce bg-gray-100 text-gray-500 font-semibold py-3.5 px-5 rounded-2xl hover:bg-gray-200">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="cute-glass p-6 rounded-[2rem]">
                    <h3 class="text-lg font-bold mb-2 text-purple-500 text-center">สัดส่วนข้อมูล 🍰</h3>
                    <div class="h-44 relative"><canvas id="cuteChart"></canvas></div>
                </div>
            </div>

            <div class="lg:col-span-2 cute-glass p-6 rounded-[2rem] flex flex-col h-full">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 no-print">
                    <h3 class="text-xl font-bold text-gray-700">สมุดรายชื่อ 📖</h3>
                    <div class="relative w-full sm:w-auto">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-pink-300"></i>
                        <input type="text" id="searchInput" placeholder="ค้นหาชื่อ, เบอร์..." class="w-full sm:w-64 bg-white/60 border-2 border-pink-100 rounded-full pl-10 pr-4 py-2.5 focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition">
                    </div>
                </div>
                
                <div class="overflow-x-auto flex-1 bg-white/40 rounded-2xl border border-pink-50">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-pink-50/50 text-pink-600">
                            <tr>
                                <th class="p-4 cursor-pointer hover:bg-pink-100/50 transition rounded-tl-2xl" onclick="sortData('name')">ชื่อ-นามสกุล <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 cursor-pointer hover:bg-pink-100/50 transition" onclick="sortData('email')">ช่องทางติดต่อ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 cursor-pointer hover:bg-pink-100/50 transition" onclick="sortData('status')">สถานะ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 text-center no-print rounded-tr-2xl">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-pink-100/50 text-gray-600">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataList = JSON.parse(localStorage.getItem('myCuteTable')) || [];
        let editingId = null;
        let chartInstance = null;
        let currentSort = { key: 'name', asc: true };

        function getStatusBadge(status) {
            if (status === 'Active') return `<span class="px-3 py-1.5 rounded-full bg-pink-100 text-pink-600 text-xs font-bold border border-pink-200">💖 Active</span>`;
            if (status === 'Pending') return `<span class="px-3 py-1.5 rounded-full bg-yellow-100 text-yellow-600 text-xs font-bold border border-yellow-200">🌟 Pending</span>`;
            return `<span class="px-3 py-1.5 rounded-full bg-gray-100 text-gray-500 text-xs font-bold border border-gray-200">💤 Inactive</span>`;
        }

        // 1. ฟังก์ชัน Render หลัก
        function renderDashboard(searchTerm = '') {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            let filteredData = dataList.filter(data => 
                data.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                data.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
                data.phone.includes(searchTerm)
            );

            filteredData.sort((a, b) => {
                let valA = a[currentSort.key].toLowerCase();
                let valB = b[currentSort.key].toLowerCase();
                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });

            if (filteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-400 font-medium">ยังไม่มีข้อมูลเลยจ้า มาเพิ่มข้อมูลกันเถอะ! ✨</td></tr>`;
            } else {
                filteredData.forEach(data => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/60 transition group">
                            <td class="p-4 font-medium text-gray-700">${data.name}</td>
                            <td class="p-4 text-sm">
                                <div class="text-gray-600"><i class="fa-solid fa-envelope text-pink-300 w-4"></i> ${data.email}</div>
                                <div class="text-gray-500 mt-1"><i class="fa-solid fa-phone text-pink-300 w-4"></i> ${data.phone}</div>
                            </td>
                            <td class="p-4">${getStatusBadge(data.status)}</td>
                            <td class="p-4 text-center no-print">
                                <button onclick="editData(${data.id})" class="w-9 h-9 rounded-full bg-blue-50 text-blue-500 hover:bg-blue-500 hover:text-white transition mx-1 shadow-sm"><i class="fa-solid fa-pen text-sm"></i></button>
                                <button onclick="deleteData(${data.id})" class="w-9 h-9 rounded-full bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition mx-1 shadow-sm"><i class="fa-solid fa-trash text-sm"></i></button>
                            </td>
                        </tr>`;
                });
            }
            updateStatsAndChart();
        }

        function sortData(key) {
            if (currentSort.key === key) currentSort.asc = !currentSort.asc; 
            else { currentSort.key = key; currentSort.asc = true; }
            renderDashboard(document.getElementById('searchInput').value);
        }

        function updateStatsAndChart() {
            let active = dataList.filter(d => d.status === 'Active').length;
            let pending = dataList.filter(d => d.status === 'Pending').length;
            let inactive = dataList.filter(d => d.status === 'Inactive').length;

            document.getElementById('statTotal').innerText = dataList.length;
            document.getElementById('statActive').innerText = active;
            document.getElementById('statInactive').innerText = pending + inactive;

            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('cuteChart').getContext('2d');
            
            const hasData = dataList.length > 0;
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Pending', 'Inactive'],
                    datasets: [{
                        data: hasData ? [active, pending, inactive] : [1],
                        backgroundColor: hasData ? ['#f472b6', '#facc15', '#cbd5e1'] : ['#fce7f3'],
                        borderWidth: 3,
                        borderColor: '#ffffff',
                        hoverOffset: 5
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 15, font: { family: 'Kanit' } } },
                        tooltip: { enabled: hasData }
                    },
                    cutout: '65%'
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => renderDashboard(e.target.value));

        function saveData() {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const status = document.getElementById('statusInput').value;

            if (!name || !email || !phone) {
                return Swal.fire({ icon: 'warning', title: 'อุ๊ย!', text: 'กรอกข้อมูลให้ครบก่อนน้าา 🥺', confirmButtonColor: '#f472b6', confirmButtonText: 'รับทราบจ้า' });
            }

            if (!editingId) {
                dataList.push({ id: Date.now(), name, email, phone, status });
                toastAlert('เพิ่มข้อมูลเรียบร้อย! 🎉');
            } else {
                const index = dataList.findIndex(d => d.id === editingId);
                dataList[index] = { id: editingId, name, email, phone, status };
                toastAlert('อัปเดตข้อมูลแล้วจ้า! ✨');
                cancelEdit();
            }
            saveAndRender();
        }

        function editData(id) {
            const data = dataList.find(d => d.id === id);
            editingId = id;
            document.getElementById('nameInput').value = data.name;
            document.getElementById('emailInput').value = data.email;
            document.getElementById('phoneInput').value = data.phone;
            document.getElementById('statusInput').value = data.status;
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen-nib mr-2"></i> แก้ไขข้อมูล';
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('saveBtn').innerHTML = 'อัปเดตเลย! 💖';
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('nameInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('phoneInput').value = '';
            document.getElementById('statusInput').value = 'Active';
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i> เพิ่มข้อมูลใหม่';
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('saveBtn').innerHTML = 'บันทึกข้อมูล';
        }

        function deleteData(id) {
            Swal.fire({
                title: 'แน่ใจน้า?', text: "ลบแล้วเอากลับมาไม่ได้แล้วนะ 🥺", icon: 'question',
                showCancelButton: true, confirmButtonColor: '#f43f5e', cancelButtonColor: '#cbd5e1',
                confirmButtonText: 'ลบเลย!', cancelButtonText: 'เปลี่ยนใจ'
            }).then((result) => {
                if (result.isConfirmed) {
                    dataList = dataList.filter(d => d.id !== id);
                    if (editingId === id) cancelEdit();
                    saveAndRender();
                    toastAlert('ลบข้อมูลเรียบร้อย 🗑️');
                }
            })
        }

        function saveAndRender() {
            localStorage.setItem('myCuteTable', JSON.stringify(dataList));
            cancelEdit();
            renderDashboard(document.getElementById('searchInput').value);
        }

        const toastAlert = (title) => {
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: title, showConfirmButton: false, timer: 2000, iconColor: '#f472b6', customClass: { title: 'text-pink-600 font-kanit' } });
        }

        function exportToCSV() {
            if (dataList.length === 0) return Swal.fire({ icon: 'info', title: 'ยังไม่มีข้อมูล', text: 'เพิ่มข้อมูลก่อนค่อยโหลดน้า 🌸', confirmButtonColor: '#f472b6' });
            let csvContent = "\uFEFFชื่อ-นามสกุล,ช่องทางติดต่อ(อีเมล),เบอร์โทรศัพท์,สถานะ\n"; 
            dataList.forEach(row => csvContent += `"${row.name}","${row.email}","${row.phone}","${row.status}"\n`);
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
            link.download = "cute_data_list.csv";
            link.click();
        }

        renderDashboard();
    </script>
</body>
</html>
