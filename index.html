<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 สมุดบันทึกรายชื่อ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            /* พื้นหลังโทนฟ้าขาว สว่าง สบายตา */
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bfdbfe 100%);
            background-attachment: fixed;
            color: #1e3a8a;
            min-height: 100vh;
        }

        /* กล่องสไตล์ Glassmorphism ที่ดูหรูหราแต่ซอฟต์ */
        .floral-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.08);
            border-radius: 1.5rem;
            position: relative;
        }

        .floral-glass:hover {
            box-shadow: 0 15px 35px rgba(30, 58, 138, 0.12);
            transition: all 0.3s ease;
        }

        /* อนิเมชันปุ่ม */
        .btn-elegant { 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-elegant:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 15px rgba(29, 78, 216, 0.2);
        }

        /* Input สไตล์นุ่มนวล */
        .elegant-input {
            background: #ffffff;
            border: 2px solid #e0f2fe;
            color: #1e3a8a;
            transition: all 0.3s ease;
        }
        .elegant-input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
            outline: none;
        }

        /* ลายดอกไม้ตกแต่งมุม */
        .floral-corner-tl {
            position: absolute; top: -10px; left: -10px; font-size: 2.5rem; opacity: 0.8;
        }
        .floral-corner-br {
            position: absolute; bottom: -10px; right: -10px; font-size: 2.5rem; opacity: 0.8;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .floral-glass { background: white; border: 1px solid #cbd5e1; box-shadow: none; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-8 relative z-10">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 floral-glass p-8">
            <div class="floral-corner-tl no-print">🌸</div>
            <h1 class="text-3xl md:text-4xl font-bold text-slate-800 flex items-center gap-3 relative z-10">
                <span class="text-blue-600"><i class="fa-solid fa-book-open"></i></span> สมุดบันทึกรายชื่อ
            </h1>
            <div class="flex gap-4 no-print relative z-10">
                <button onclick="window.print()" class="btn-elegant bg-white text-blue-600 border-2 border-blue-100 px-6 py-2.5 rounded-full font-semibold">
                    <i class="fa-solid fa-print mr-2"></i> ปริ้นท์เอกสาร
                </button>
                <button onclick="exportToCSV()" class="btn-elegant bg-blue-600 text-white px-6 py-2.5 rounded-full font-semibold">
                    <i class="fa-solid fa-download mr-2"></i> โหลด CSV
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="floral-glass p-6 flex items-center justify-between">
                <div>
                    <p class="text-slate-500 font-semibold text-lg mb-1">รายชื่อทั้งหมด 🌼</p>
                    <h2 id="statTotal" class="text-4xl font-bold text-blue-900">0</h2>
                </div>
                <div class="w-16 h-16 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 text-3xl"><i class="fa-solid fa-users"></i></div>
            </div>
            <div class="floral-glass p-6 flex items-center justify-between">
                <div>
                    <p class="text-slate-500 font-semibold text-lg mb-1">สถานะปกติ 🌿</p>
                    <h2 id="statActive" class="text-4xl font-bold text-blue-500">0</h2>
                </div>
                <div class="w-16 h-16 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 text-3xl"><i class="fa-solid fa-circle-check"></i></div>
            </div>
            <div class="floral-glass p-6 flex items-center justify-between">
                <div>
                    <p class="text-slate-500 font-semibold text-lg mb-1">สถานะอื่นๆ ☁️</p>
                    <h2 id="statInactive" class="text-4xl font-bold text-slate-400">0</h2>
                </div>
                <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 text-3xl"><i class="fa-solid fa-clock"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="space-y-8 lg:col-span-4 no-print">
                
                <div class="floral-glass p-8">
                    <h3 class="text-2xl font-bold mb-6 text-blue-800 flex items-center gap-2" id="formTitle">
                        <i class="fa-solid fa-pen-to-square text-blue-500"></i> เพิ่มข้อมูลใหม่
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">ชื่อ - นามสกุล</label>
                            <input type="text" id="nameInput" placeholder="ระบุชื่อจริง หรือชื่อเล่น" class="w-full elegant-input rounded-xl p-3 text-slate-700">
                        </div>
                        
                        <div class="flex gap-3">
                            <div class="w-1/2">
                                <label class="block text-sm font-medium text-slate-600 mb-1">อาชีพ</label>
                                <input type="text" id="occupationInput" placeholder="เช่น ครีเอเตอร์" class="w-full elegant-input rounded-xl p-3 text-slate-700">
                            </div>
                            <div class="w-1/2">
                                <label class="block text-sm font-medium text-slate-600 mb-1">เงินเดือน (฿)</label>
                                <input type="number" id="salaryInput" placeholder="ระบุตัวเลข" class="w-full elegant-input rounded-xl p-3 text-slate-700">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">อีเมลติดต่อ</label>
                            <input type="email" id="emailInput" placeholder="example@mail.com" class="w-full elegant-input rounded-xl p-3 text-slate-700">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">เบอร์โทรศัพท์</label>
                            <input type="text" id="phoneInput" placeholder="08X-XXX-XXXX" class="w-full elegant-input rounded-xl p-3 text-slate-700">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">สถานะ</label>
                            <select id="statusInput" class="w-full elegant-input rounded-xl p-3 text-slate-700 font-medium">
                                <option value="Active">🟢 ปกติ (Active)</option>
                                <option value="Pending">🟡 รอดำเนินการ (Pending)</option>
                                <option value="Inactive">⚪️ พักงาน (Inactive)</option>
                            </select>
                        </div>

                        <div class="flex gap-3 pt-4">
                            <button onclick="saveData()" id="saveBtn" class="btn-elegant flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-lg">
                                บันทึกข้อมูล
                            </button>
                            <button onclick="cancelEdit()" id="cancelBtn" class="hidden btn-elegant bg-slate-100 text-slate-500 font-bold py-3.5 px-5 rounded-xl hover:bg-slate-200">
                                ยกเลิก
                            </button>
                        </div>
                    </div>
                </div>

                <div class="floral-glass p-8">
                    <h3 class="text-lg font-bold mb-4 text-center text-slate-700">สัดส่วนสถานะ 📊</h3>
                    <div class="h-48 relative"><canvas id="statusChart"></canvas></div>
                </div>
            </div>

            <div class="lg:col-span-8 floral-glass p-8 flex flex-col h-full">
                <div class="floral-corner-br no-print">🌿</div>
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 no-print relative z-10">
                    <h3 class="text-2xl font-bold text-blue-900">
                        ตารางรายชื่อทั้งหมด
                    </h3>
                    <div class="relative w-full md:w-72">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                        <input type="text" id="searchInput" placeholder="ค้นหาชื่อ, อาชีพ..." class="w-full bg-white border border-blue-100 rounded-full pl-11 pr-4 py-2.5 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition text-slate-700">
                    </div>
                </div>
                
                <div class="overflow-x-auto flex-1 bg-white rounded-2xl border border-blue-50 shadow-sm relative z-10">
                    <table class="w-full text-left whitespace-nowrap border-collapse">
                        <thead class="bg-blue-50/50 text-blue-900 border-b border-blue-100">
                            <tr>
                                <th class="p-4 font-semibold cursor-pointer hover:bg-blue-100/50 transition" onclick="sortData('name')">ข้อมูลบุคคล <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 font-semibold cursor-pointer hover:bg-blue-100/50 transition" onclick="sortData('occupation')">อาชีพ & รายได้ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 font-semibold cursor-pointer hover:bg-blue-100/50 transition" onclick="sortData('email')">ติดต่อ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 font-semibold cursor-pointer hover:bg-blue-100/50 transition" onclick="sortData('status')">สถานะ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 font-semibold text-center no-print">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataList = JSON.parse(localStorage.getItem('myElegantTable')) || [];
        let editingId = null;
        let chartInstance = null;
        let currentSort = { key: 'name', asc: true };

        function getStatusBadge(status) {
            if (status === 'Active') return `<span class="px-3 py-1.5 rounded-full bg-green-50 text-green-600 text-xs font-semibold border border-green-200">🟢 Active</span>`;
            if (status === 'Pending') return `<span class="px-3 py-1.5 rounded-full bg-yellow-50 text-yellow-600 text-xs font-semibold border border-yellow-200">🟡 Pending</span>`;
            return `<span class="px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 text-xs font-semibold border border-slate-200">⚪️ Inactive</span>`;
        }

        function renderDashboard(searchTerm = '') {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            let filteredData = dataList.filter(data => 
                data.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                data.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
                data.phone.includes(searchTerm) ||
                (data.occupation && data.occupation.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            filteredData.sort((a, b) => {
                let valA = a[currentSort.key] ? a[currentSort.key].toLowerCase() : '';
                let valB = b[currentSort.key] ? b[currentSort.key].toLowerCase() : '';
                
                if (currentSort.key === 'salary') {
                    valA = Number(a.salary) || 0; valB = Number(b.salary) || 0;
                }

                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });

            if (filteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-slate-400 font-medium">ยังไม่มีข้อมูลในระบบเลยค่ะ 🌸 ลองเพิ่มข้อมูลดูนะคะ</td></tr>`;
            } else {
                filteredData.forEach(data => {
                    const formatSalary = data.salary ? Number(data.salary).toLocaleString('th-TH') + ' ฿' : '-';

                    tableBody.innerHTML += `
                        <tr class="hover:bg-blue-50/30 transition-colors">
                            <td class="p-4">
                                <div class="font-semibold text-slate-800 text-base">${data.name}</div>
                            </td>
                            <td class="p-4">
                                <div class="font-medium text-blue-700">${data.occupation || '-'}</div>
                                <div class="text-sm text-slate-500 mt-0.5">รายได้: ${formatSalary}</div>
                            </td>
                            <td class="p-4 text-sm text-slate-600">
                                <div class="flex items-center gap-2"><i class="fa-regular fa-envelope text-slate-400 w-4"></i> ${data.email}</div>
                                <div class="flex items-center gap-2 mt-1"><i class="fa-solid fa-phone text-slate-400 w-4"></i> ${data.phone}</div>
                            </td>
                            <td class="p-4">${getStatusBadge(data.status)}</td>
                            <td class="p-4 text-center no-print">
                                <button onclick="editData(${data.id})" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-colors mx-1"><i class="fa-solid fa-pen text-sm"></i></button>
                                <button onclick="deleteData(${data.id})" class="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-colors mx-1"><i class="fa-solid fa-trash text-sm"></i></button>
                            </td>
                        </tr>`;
                });
            }
            updateStatsAndChart();
        }

        function sortData(key) {
            if (currentSort.key === key) currentSort.asc = !currentSort.asc; 
            else { currentSort.key = key; currentSort.asc = true; }
            renderDashboard(document.getElementById('searchInput').value);
        }

        function updateStatsAndChart() {
            let active = dataList.filter(d => d.status === 'Active').length;
            let pending = dataList.filter(d => d.status === 'Pending').length;
            let inactive = dataList.filter(d => d.status === 'Inactive').length;

            document.getElementById('statTotal').innerText = dataList.length;
            document.getElementById('statActive').innerText = active;
            document.getElementById('statInactive').innerText = pending + inactive;

            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('statusChart').getContext('2d');
            
            const hasData = dataList.length > 0;
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Pending', 'Inactive'],
                    datasets: [{
                        data: hasData ? [active, pending, inactive] : [1],
                        backgroundColor: hasData ? ['#3b82f6', '#facc15', '#cbd5e1'] : ['#e2e8f0'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom', labels: { usePointStyle: true, font: { family: 'Kanit' } } },
                        tooltip: { enabled: hasData }
                    },
                    cutout: '70%'
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => renderDashboard(e.target.value));

        function saveData() {
            const name = document.getElementById('nameInput').value.trim();
            const occupation = document.getElementById('occupationInput').value.trim();
            const salary = document.getElementById('salaryInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const status = document.getElementById('statusInput').value;

            if (!name || !email || !phone || !occupation || !salary) {
                return Swal.fire({ 
                    icon: 'warning', title: 'ข้อมูลไม่ครบถ้วน', 
                    text: 'รบกวนกรอกข้อมูลให้ครบทุกช่องด้วยนะคะ 🌸', 
                    confirmButtonColor: '#2563eb'
                });
            }

            if (!editingId) {
                dataList.push({ id: Date.now(), name, occupation, salary, email, phone, status });
                toastAlert('บันทึกข้อมูลเรียบร้อยค่ะ ✨');
            } else {
                const index = dataList.findIndex(d => d.id === editingId);
                dataList[index] = { id: editingId, name, occupation, salary, email, phone, status };
                toastAlert('อัปเดตข้อมูลเรียบร้อยค่ะ 📝');
                cancelEdit();
            }
            saveAndRender();
        }

        function editData(id) {
            const data = dataList.find(d => d.id === id);
            editingId = id;
            document.getElementById('nameInput').value = data.name;
            document.getElementById('occupationInput').value = data.occupation || '';
            document.getElementById('salaryInput').value = data.salary || '';
            document.getElementById('emailInput').value = data.email;
            document.getElementById('phoneInput').value = data.phone;
            document.getElementById('statusInput').value = data.status;
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-blue-500"></i> แก้ไขข้อมูล';
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('saveBtn').innerHTML = 'อัปเดตข้อมูล';
            document.getElementById('saveBtn').classList.replace('bg-blue-600', 'bg-blue-700');
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('nameInput').value = '';
            document.getElementById('occupationInput').value = '';
            document.getElementById('salaryInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('phoneInput').value = '';
            document.getElementById('statusInput').value = 'Active';
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-blue-500"></i> เพิ่มข้อมูลใหม่';
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('saveBtn').innerHTML = 'บันทึกข้อมูล';
            document.getElementById('saveBtn').classList.replace('bg-blue-700', 'bg-blue-600');
        }

        function deleteData(id) {
            Swal.fire({
                title: 'ยืนยันการลบข้อมูล?', 
                text: "หากลบแล้วจะไม่สามารถกู้คืนได้นะคะ", 
                icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#94a3b8',
                confirmButtonText: 'ลบข้อมูล', cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    dataList = dataList.filter(d => d.id !== id);
                    if (editingId === id) cancelEdit();
                    saveAndRender();
                    toastAlert('ลบข้อมูลเรียบร้อยค่ะ 🗑️');
                }
            })
        }

        function saveAndRender() {
            localStorage.setItem('myElegantTable', JSON.stringify(dataList));
            cancelEdit();
            renderDashboard(document.getElementById('searchInput').value);
        }

        const toastAlert = (title) => {
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: title, showConfirmButton: false, timer: 2500, iconColor: '#3b82f6', customClass: { title: 'text-blue-700 font-kanit' } });
        }

        function exportToCSV() {
            if (dataList.length === 0) return Swal.fire({ icon: 'info', title: 'ยังไม่มีข้อมูล', text: 'เพิ่มข้อมูลในระบบก่อนดาวน์โหลดนะคะ 🌸', confirmButtonColor: '#2563eb' });
            let csvContent = "\uFEFFชื่อ-นามสกุล,อาชีพ,เงินเดือน(บาท),อีเมล,เบอร์โทรศัพท์,สถานะ\n"; 
            dataList.forEach(row => {
                csvContent += `"${row.name}","${row.occupation || ''}","${row.salary || ''}","${row.email}","${row.phone}","${row.status}"\n`;
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
            link.download = "elegant_list.csv";
            link.click();
        }

        renderDashboard();
    </script>
</body>
</html>
