<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลลูกค้า/พนักงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-600">📊 ระบบจัดการข้อมูล</h1>
            <button onclick="exportToCSV()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded shadow transition">
                📥 ดาวน์โหลด CSV
            </button>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-lg font-semibold mb-4" id="formTitle">➕ เพิ่มข้อมูลใหม่</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="nameInput" placeholder="ชื่อ - นามสกุล" class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
                <input type="email" id="emailInput" placeholder="อีเมล" class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
                <input type="text" id="phoneInput" placeholder="เบอร์โทรศัพท์" class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="saveData()" id="saveBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded shadow transition">บันทึกข้อมูล</button>
                <button onclick="cancelEdit()" id="cancelBtn" class="hidden bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded shadow transition">ยกเลิก</button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="p-4 border-b">ลำดับ</th>
                        <th class="p-4 border-b">ชื่อ - นามสกุล</th>
                        <th class="p-4 border-b">อีเมล</th>
                        <th class="p-4 border-b">เบอร์โทรศัพท์</th>
                        <th class="p-4 border-b text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let dataList = JSON.parse(localStorage.getItem('myAdvancedTable')) || [];
        let editingIndex = -1; // ตัวแปรเช็กว่ากำลังแก้ไขแถวไหนอยู่ (-1 คือไม่ได้แก้ไข)

        // 1. ฟังก์ชันแสดงข้อมูล
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            if (dataList.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-500">ยังไม่มีข้อมูลในระบบ</td></tr>`;
                return;
            }

            dataList.forEach((data, index) => {
                const row = `<tr class="hover:bg-gray-50 transition">
                    <td class="p-4">${index + 1}</td>
                    <td class="p-4 font-medium">${data.name}</td>
                    <td class="p-4 text-gray-600">${data.email}</td>
                    <td class="p-4 text-gray-600">${data.phone}</td>
                    <td class="p-4 text-center">
                        <button onclick="editData(${index})" class="text-yellow-500 hover:text-yellow-700 mx-1">✏️ แก้ไข</button>
                        <button onclick="deleteData(${index})" class="text-red-500 hover:text-red-700 mx-1">🗑️ ลบ</button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        // 2. ฟังก์ชันบันทึกข้อมูล (ใช้ได้ทั้งเพิ่มใหม่และอัปเดต)
        function saveData() {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();

            if (!name || !email || !phone) {
                alert('กรุณากรอกข้อมูลให้ครบทุกช่อง!');
                return;
            }

            if (editingIndex === -1) {
                // เพิ่มข้อมูลใหม่
                dataList.push({ name, email, phone });
            } else {
                // อัปเดตข้อมูลเดิม
                dataList[editingIndex] = { name, email, phone };
                cancelEdit(); // คืนค่าฟอร์มกลับเป็นโหมดปกติ
            }
            
            saveToStorageAndRender();
        }

        // 3. ฟังก์ชันดึงข้อมูลมาใส่ฟอร์มเพื่อแก้ไข
        function editData(index) {
            editingIndex = index;
            const data = dataList[index];
            
            document.getElementById('nameInput').value = data.name;
            document.getElementById('emailInput').value = data.email;
            document.getElementById('phoneInput').value = data.phone;
            
            document.getElementById('formTitle').innerHTML = '✏️ แก้ไขข้อมูล';
            document.getElementById('saveBtn').innerHTML = 'อัปเดตข้อมูล';
            document.getElementById('saveBtn').classList.replace('bg-blue-500', 'bg-yellow-500');
            document.getElementById('saveBtn').classList.replace('hover:bg-blue-600', 'hover:bg-yellow-600');
            document.getElementById('cancelBtn').classList.remove('hidden');
        }

        // 4. ฟังก์ชันยกเลิกการแก้ไข
        function cancelEdit() {
            editingIndex = -1;
            document.getElementById('nameInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('phoneInput').value = '';
            
            document.getElementById('formTitle').innerHTML = '➕ เพิ่มข้อมูลใหม่';
            document.getElementById('saveBtn').innerHTML = 'บันทึกข้อมูล';
            document.getElementById('saveBtn').classList.replace('bg-yellow-500', 'bg-blue-500');
            document.getElementById('saveBtn').classList.replace('hover:bg-yellow-600', 'hover:bg-blue-600');
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        // 5. ฟังก์ชันลบข้อมูล
        function deleteData(index) {
            if(confirm('คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลนี้?')) {
                dataList.splice(index, 1);
                if (editingIndex === index) cancelEdit(); // ถ้ายกเลิกตัวที่กำลังแก้พอดี
                saveToStorageAndRender();
            }
        }

        // 6. ฟังก์ชันดาวน์โหลดเป็นไฟล์ CSV (Excel)
        function exportToCSV() {
            if (dataList.length === 0) {
                alert('ไม่มีข้อมูลสำหรับดาวน์โหลด');
                return;
            }
            // ใส่ BOM เพื่อให้ Excel อ่านภาษาไทยได้
            let csvContent = "\uFEFFลำดับ,ชื่อ-นามสกุล,อีเมล,เบอร์โทรศัพท์\n"; 
            dataList.forEach((row, index) => {
                csvContent += `${index + 1},"${row.name}","${row.email}","${row.phone}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "data_export.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ฟังก์ชันช่วยบันทึกและรีเฟรชหน้าจอ
        function saveToStorageAndRender() {
            localStorage.setItem('myAdvancedTable', JSON.stringify(dataList));
            document.getElementById('nameInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('phoneInput').value = '';
            renderTable();
        }

        // เรียกใช้งานตอนเปิดเว็บ
        renderTable();
    </script>
</body>
</html>
