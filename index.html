<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 สมุดจดข้อมูลส่วนบุคคล</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            /* พื้นหลังอวกาศสุดอลัง */
            background: radial-gradient(circle at 10% 20%, rgb(28, 15, 69) 0%, rgb(17, 9, 40) 90%);
            background-attachment: fixed;
            color: #e2e8f0;
        }
        /* กล่องกระจกเรืองแสง */
        .magic-glass {
            background: rgba(30, 20, 60, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
        }
        .magic-glass:hover {
            box-shadow: 0 15px 40px 0 rgba(236, 72, 153, 0.3);
            border-color: rgba(236, 72, 153, 0.5);
        }
        /* เอฟเฟกต์ตัวหนังสือเรืองแสง */
        .glow-text {
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.8), 0 0 30px rgba(139, 92, 246, 0.6);
        }
        .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-bounce:hover { transform: translateY(-4px) scale(1.05); }
        
        /* สไตล์ช่องกรอกข้อมูลแบบล้ำๆ */
        .cyber-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #fff;
        }
        .cyber-input:focus {
            border-color: #f472b6;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
            outline: none;
        }
        
        /* ปรับแต่ง Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); rounded-full; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ec4899; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            .magic-glass, .cyber-input { background: white; border: 1px solid #ccc; box-shadow: none; color: black; }
            .glow-text { text-shadow: none; color: black; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 magic-glass p-6 rounded-[2rem]">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-cyan-400 glow-text flex items-center gap-3">
                🔮 ทะเบียนผู้กล้าสุดอลังการ ✨
            </h1>
            <div class="flex gap-3 no-print">
                <button onclick="window.print()" class="btn-bounce bg-white/10 border border-cyan-400 text-cyan-300 hover:bg-cyan-400 hover:text-gray-900 px-5 py-2.5 rounded-full font-medium shadow-[0_0_15px_rgba(34,211,238,0.4)]">
                    <i class="fa-solid fa-scroll mr-1"></i> สั่งปริ้นท์
                </button>
                <button onclick="exportToCSV()" class="btn-bounce bg-gradient-to-r from-pink-500 to-purple-600 text-white shadow-[0_0_20px_rgba(236,72,153,0.5)] px-5 py-2.5 rounded-full font-medium">
                    <i class="fa-solid fa-meteor mr-1"></i> ดึงข้อมูล (CSV)
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="magic-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-purple-300 font-medium">ปาร์ตี้ทั้งหมด 🦸‍♂️</p>
                    <h2 id="statTotal" class="text-4xl font-bold text-white mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-purple-900/50 border border-purple-400 flex items-center justify-center text-purple-300 text-2xl shadow-[0_0_15px_rgba(168,85,247,0.5)]"><i class="fa-solid fa-users-rays"></i></div>
            </div>
            <div class="magic-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-pink-300 font-medium">พร้อมลุย! ⚡</p>
                    <h2 id="statActive" class="text-4xl font-bold text-white mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-pink-900/50 border border-pink-400 flex items-center justify-center text-pink-300 text-2xl shadow-[0_0_15px_rgba(236,72,153,0.5)]"><i class="fa-solid fa-fire-flame-curved"></i></div>
            </div>
            <div class="magic-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-cyan-300 font-medium">พักฟื้น / หายตัว 💤</p>
                    <h2 id="statInactive" class="text-4xl font-bold text-white mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-cyan-900/50 border border-cyan-400 flex items-center justify-center text-cyan-300 text-2xl shadow-[0_0_15px_rgba(34,211,238,0.5)]"><i class="fa-solid fa-bed"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="space-y-6 lg:col-span-4 no-print">
                <div class="magic-glass p-6 rounded-[2rem]">
                    <h3 class="text-xl font-bold mb-5 text-pink-400" id="formTitle"><i class="fa-solid fa-wand-sparkles mr-2"></i> เรียกตัวละครใหม่ 🪄</h3>
                    <div class="space-y-4">
                        <input type="text" id="nameInput" placeholder="ชื่อ - นามสกุล" class="w-full cyber-input rounded-2xl p-3.5 transition">
                        
                        <div class="flex gap-2">
                            <input type="text" id="occupationInput" placeholder="อาชีพ (Class)" class="w-full cyber-input rounded-2xl p-3.5 transition">
                            <input type="number" id="salaryInput" placeholder="รายได้/เดือน 💰" class="w-full cyber-input rounded-2xl p-3.5 transition">
                        </div>

                        <input type="email" id="emailInput" placeholder="อีเมลติดต่อ" class="w-full cyber-input rounded-2xl p-3.5 transition">
                        <input type="text" id="phoneInput" placeholder="เบอร์โทรศัพท์" class="w-full cyber-input rounded-2xl p-3.5 transition">
                        
                        <select id="statusInput" class="w-full cyber-input rounded-2xl p-3.5 transition">
                            <option value="Active" class="text-black">⚡ พร้อมรบ (Active)</option>
                            <option value="Pending" class="text-black">⏳ รอคูลดาวน์ (Pending)</option>
                            <option value="Inactive" class="text-black">💤 พักผ่อน (Inactive)</option>
                        </select>

                        <div class="flex gap-3 pt-3">
                            <button onclick="saveData()" id="saveBtn" class="btn-bounce flex-1 bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 text-white font-bold py-3.5 rounded-2xl shadow-[0_0_20px_rgba(236,72,153,0.4)]">
                                เสกข้อมูลเข้าตาราง!
                            </button>
                            <button onclick="cancelEdit()" id="cancelBtn" class="hidden btn-bounce bg-gray-800 border border-gray-600 text-gray-300 font-bold py-3.5 px-5 rounded-2xl hover:bg-gray-700">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="magic-glass p-6 rounded-[2rem]">
                    <h3 class="text-lg font-bold mb-2 text-cyan-400 text-center">สัดส่วนผู้กล้า 📊</h3>
                    <div class="h-44 relative"><canvas id="magicChart"></canvas></div>
                </div>
            </div>

            <div class="lg:col-span-8 magic-glass p-6 rounded-[2rem] flex flex-col h-full">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 no-print">
                    <h3 class="text-xl font-bold text-purple-300">ตารางรายชื่อรวมดาว 🌟</h3>
                    <div class="relative w-full sm:w-auto">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-purple-400"></i>
                        <input type="text" id="searchInput" placeholder="ค้นหาชื่อ, อาชีพ..." class="w-full sm:w-64 cyber-input rounded-full pl-10 pr-4 py-2.5 transition">
                    </div>
                </div>
                
                <div class="overflow-x-auto flex-1 bg-black/20 rounded-2xl border border-purple-500/30">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-purple-900/50 text-pink-300 border-b border-purple-500/30">
                            <tr>
                                <th class="p-4 cursor-pointer hover:bg-purple-800/50 transition rounded-tl-2xl" onclick="sortData('name')">นามกรผู้กล้า <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 cursor-pointer hover:bg-purple-800/50 transition" onclick="sortData('occupation')">อาชีพ & รายได้ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 cursor-pointer hover:bg-purple-800/50 transition" onclick="sortData('email')">ช่องทางติดต่อ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 cursor-pointer hover:bg-purple-800/50 transition" onclick="sortData('status')">สถานะปัจจุบัน <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 text-center no-print rounded-tr-2xl">ควบคุม</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-purple-500/20 text-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataList = JSON.parse(localStorage.getItem('myMagicTable')) || [];
        let editingId = null;
        let chartInstance = null;
        let currentSort = { key: 'name', asc: true };

        function getStatusBadge(status) {
            if (status === 'Active') return `<span class="px-3 py-1.5 rounded-full bg-pink-900/50 text-pink-300 text-xs font-bold border border-pink-400 shadow-[0_0_10px_rgba(236,72,153,0.3)]">⚡ พร้อมรบ</span>`;
            if (status === 'Pending') return `<span class="px-3 py-1.5 rounded-full bg-yellow-900/50 text-yellow-300 text-xs font-bold border border-yellow-400 shadow-[0_0_10px_rgba(250,204,21,0.3)]">⏳ รอคูลดาวน์</span>`;
            return `<span class="px-3 py-1.5 rounded-full bg-gray-800/80 text-gray-400 text-xs font-bold border border-gray-500">💤 พักผ่อน</span>`;
        }

        function renderDashboard(searchTerm = '') {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            let filteredData = dataList.filter(data => 
                data.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                data.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
                data.phone.includes(searchTerm) ||
                data.occupation.toLowerCase().includes(searchTerm.toLowerCase())
            );

            filteredData.sort((a, b) => {
                let valA = a[currentSort.key] ? a[currentSort.key].toLowerCase() : '';
                let valB = b[currentSort.key] ? b[currentSort.key].toLowerCase() : '';
                
                if (currentSort.key === 'salary') {
                    valA = Number(a.salary); valB = Number(b.salary);
                }

                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });

            if (filteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-500 font-medium">ยังไม่มีผู้กล้าในปาร์ตี้เลย รีบมาเพิ่มกันเถอะ! 🌌</td></tr>`;
            } else {
                filteredData.forEach(data => {
                    const formatSalary = data.salary ? Number(data.salary).toLocaleString('th-TH') + ' ฿' : '-';
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 transition group">
                            <td class="p-4 font-bold text-cyan-300">${data.name}</td>
                            <td class="p-4">
                                <div class="font-medium text-pink-300"><i class="fa-solid fa-hat-wizard text-pink-500 w-4"></i> ${data.occupation || '-'}</div>
                                <div class="text-sm text-yellow-300 mt-1"><i class="fa-solid fa-coins text-yellow-500 w-4"></i> ${formatSalary}</div>
                            </td>
                            <td class="p-4 text-sm">
                                <div class="text-purple-200"><i class="fa-solid fa-paper-plane text-purple-400 w-4"></i> ${data.email}</div>
                                <div class="text-gray-400 mt-1"><i class="fa-solid fa-mobile-screen text-purple-400 w-4"></i> ${data.phone}</div>
                            </td>
                            <td class="p-4">${getStatusBadge(data.status)}</td>
                            <td class="p-4 text-center no-print">
                                <button onclick="editData(${data.id})" class="w-9 h-9 rounded-full bg-blue-900/50 border border-blue-500 text-blue-300 hover:bg-blue-500 hover:text-white transition mx-1"><i class="fa-solid fa-pen text-sm"></i></button>
                                <button onclick="deleteData(${data.id})" class="w-9 h-9 rounded-full bg-red-900/50 border border-red-500 text-red-300 hover:bg-red-500 hover:text-white transition mx-1"><i class="fa-solid fa-trash text-sm"></i></button>
                            </td>
                        </tr>`;
                });
            }
            updateStatsAndChart();
        }

        function sortData(key) {
            if (currentSort.key === key) currentSort.asc = !currentSort.asc; 
            else { currentSort.key = key; currentSort.asc = true; }
            renderDashboard(document.getElementById('searchInput').value);
        }

        function updateStatsAndChart() {
            let active = dataList.filter(d => d.status === 'Active').length;
            let pending = dataList.filter(d => d.status === 'Pending').length;
            let inactive = dataList.filter(d => d.status === 'Inactive').length;

            document.getElementById('statTotal').innerText = dataList.length;
            document.getElementById('statActive').innerText = active;
            document.getElementById('statInactive').innerText = pending + inactive;

            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('magicChart').getContext('2d');
            
            const hasData = dataList.length > 0;
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Pending', 'Inactive'],
                    datasets: [{
                        data: hasData ? [active, pending, inactive] : [1],
                        backgroundColor: hasData ? ['#ec4899', '#facc15', '#4b5563'] : ['#1f2937'],
                        borderWidth: 2,
                        borderColor: '#1e1b4b',
                        hoverOffset: 5
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 15, font: { family: 'Kanit' }, color: '#d8b4fe' } },
                        tooltip: { enabled: hasData }
                    },
                    cutout: '70%'
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => renderDashboard(e.target.value));

        function saveData() {
            const name = document.getElementById('nameInput').value.trim();
            const occupation = document.getElementById('occupationInput').value.trim();
            const salary = document.getElementById('salaryInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const status = document.getElementById('statusInput').value;

            if (!name || !email || !phone || !occupation || !salary) {
                return Swal.fire({ icon: 'warning', title: 'ร่ายมนต์ไม่สำเร็จ!', text: 'ต้องใส่ข้อมูลให้ครบทุกช่องก่อนนะท่าน 🧙‍♂️', background: '#1e1b4b', color: '#fff', confirmButtonColor: '#ec4899' });
            }

            if (!editingId) {
                dataList.push({ id: Date.now(), name, occupation, salary, email, phone, status });
                toastAlert('อัญเชิญตัวละครสำเร็จ! ✨');
            } else {
                const index = dataList.findIndex(d => d.id === editingId);
                dataList[index] = { id: editingId, name, occupation, salary, email, phone, status };
                toastAlert('อัปเกรดข้อมูลเรียบร้อย! 🪄');
                cancelEdit();
            }
            saveAndRender();
        }

        function editData(id) {
            const data = dataList.find(d => d.id === id);
            editingId = id;
            document.getElementById('nameInput').value = data.name;
            document.getElementById('occupationInput').value = data.occupation || '';
            document.getElementById('salaryInput').value = data.salary || '';
            document.getElementById('emailInput').value = data.email;
            document.getElementById('phoneInput').value = data.phone;
            document.getElementById('statusInput').value = data.status;
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-wand-magic mr-2"></i> ปรับแต่งตัวละคร';
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('saveBtn').innerHTML = 'อัปเกรดเลย! 🔮';
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('nameInput').value = '';
            document.getElementById('occupationInput').value = '';
            document.getElementById('salaryInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('phoneInput').value = '';
            document.getElementById('statusInput').value = 'Active';
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-wand-sparkles mr-2"></i> เรียกตัวละครใหม่ 🪄';
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('saveBtn').innerHTML = 'เสกข้อมูลเข้าตาราง!';
        }

        function deleteData(id) {
            Swal.fire({
                title: 'ลบออกจากปาร์ตี้?', text: "เตะออกแล้วเรียกคืนไม่ได้แล้วนะท่าน! ⚔️", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#4b5563',
                confirmButtonText: 'ลบเลย!', cancelButtonText: 'ช้าก่อน', background: '#1e1b4b', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    dataList = dataList.filter(d => d.id !== id);
                    if (editingId === id) cancelEdit();
                    saveAndRender();
                    toastAlert('เนรเทศเรียบร้อย 🌪️');
                }
            })
        }

        function saveAndRender() {
            localStorage.setItem('myMagicTable', JSON.stringify(dataList));
            cancelEdit();
            renderDashboard(document.getElementById('searchInput').value);
        }

        const toastAlert = (title) => {
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: title, showConfirmButton: false, timer: 2000, background: '#1e1b4b', color: '#ec4899', iconColor: '#ec4899' });
        }

        function exportToCSV() {
            if (dataList.length === 0) return Swal.fire({ icon: 'info', title: 'ว่างเปล่า', text: 'เพิ่มผู้กล้าก่อนค่อยโหลดนะ 📜', background: '#1e1b4b', color: '#fff', confirmButtonColor: '#a855f7' });
            let csvContent = "\uFEFFนามกรผู้กล้า,อาชีพ(Class),รายได้,อีเมล,เบอร์ติดต่อ,สถานะ\n"; 
            dataList.forEach(row => {
                csvContent += `"${row.name}","${row.occupation || ''}","${row.salary || ''}","${row.email}","${row.phone}","${row.status}"\n`;
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
            link.download = "magic_party_list.csv";
            link.click();
        }

        renderDashboard();
    </script>
</body>
</html>
