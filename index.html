<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪻 ระบบเก็บข้อมูลส่วนบุคคล</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            /* โทนสีฟ้า ขาว น้ำเงิน */
            background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 50%, #bfdbfe 100%);
            background-attachment: fixed;
            color: #1e3a8a; /* Navy blue */
        }
        /* กล่องแบบกระจกน่ารักๆ */
        .cute-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1);
        }
        .cute-glass:hover {
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.15);
        }
        /* อนิเมชันปุ่มเด้งๆ */
        .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-bounce:hover { transform: translateY(-3px) scale(1.02); }
        
        /* ซ่อนตอนปริ้นท์ */
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .cute-glass { background: white; border: 1px solid #bfdbfe; box-shadow: none; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen text-slate-700">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 cute-glass p-6 rounded-[2rem]">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-800 flex items-center gap-2">
                🪻 ระบบเก็บข้อมูลบุคลากร 🌼
            </h1>
            <div class="flex gap-3 no-print">
                <button onclick="window.print()" class="btn-bounce bg-white text-blue-600 border-2 border-blue-200 hover:bg-blue-50 px-5 py-2.5 rounded-full font-medium">
                    <i class="fa-solid fa-print mr-1"></i> ปริ้นท์
                </button>
                <button onclick="exportToCSV()" class="btn-bounce bg-gradient-to-r from-blue-400 to-indigo-500 text-white shadow-lg shadow-blue-200 px-5 py-2.5 rounded-full font-medium">
                    <i class="fa-solid fa-cloud-arrow-down mr-1"></i> โหลด CSV
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="cute-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-slate-500 font-medium">บุคลากรทั้งหมด 💠</p>
                    <h2 id="statTotal" class="text-4xl font-bold text-indigo-700 mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500 text-2xl shadow-inner"><i class="fa-solid fa-users"></i></div>
            </div>
            <div class="cute-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-slate-500 font-medium">สถานะปกติ 💙</p>
                    <h2 id="statActive" class="text-4xl font-bold text-blue-500 mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center text-blue-500 text-2xl shadow-inner"><i class="fa-solid fa-face-smile-wink"></i></div>
            </div>
            <div class="cute-glass p-6 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-slate-500 font-medium">สถานะอื่นๆ ☁️</p>
                    <h2 id="statInactive" class="text-4xl font-bold text-slate-500 mt-1">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 text-2xl shadow-inner"><i class="fa-solid fa-mug-hot"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="space-y-6 lg:col-span-4 no-print">
                <div class="cute-glass p-6 rounded-[2rem]">
                    <h3 class="text-xl font-bold mb-5 text-blue-600" id="formTitle"><i class="fa-solid fa-seedling mr-2"></i> เพิ่มข้อมูลใหม่ 🌿</h3>
                    <div class="space-y-4">
                        <input type="text" id="nameInput" placeholder="ชื่อ - นามสกุล" class="w-full bg-white/60 border-2 border-blue-100 rounded-2xl p-3.5 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition text-slate-700">
                        
                        <div class="flex gap-2">
                            <input type="text" id="positionInput" placeholder="ตำแหน่งงาน" class="w-full bg-white/60 border-2 border-blue-100 rounded-2xl p-3.5 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition text-slate-700">
                            <input type="number" id="salaryInput" placeholder="เงินเดือน (บาท)" class="w-full bg-white/60 border-2 border-blue-100 rounded-2xl p-3.5 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition text-slate-700">
                        </div>

                        <input type="email" id="emailInput" placeholder="อีเมลติดต่อ" class="w-full bg-white/60 border-2 border-blue-100 rounded-2xl p-3.5 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition text-slate-700">
                        <input type="text" id="phoneInput" placeholder="เบอร์โทรศัพท์" class="w-full bg-white/60 border-2 border-blue-100 rounded-2xl p-3.5 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition text-slate-700">
                        
                        <select id="statusInput" class="w-full bg-white/60 border-2 border-blue-100 rounded-2xl p-3.5 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition text-slate-600">
                            <option value="Active">💙 ปกติ (Active)</option>
                            <option value="Pending">🌼 รอคิว (Pending)</option>
                            <option value="Inactive">☁️ พักก่อน (Inactive)</option>
                        </select>

                        <div class="flex gap-3 pt-3">
                            <button onclick="saveData()" id="saveBtn" class="btn-bounce flex-1 bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-semibold py-3.5 rounded-2xl shadow-lg shadow-blue-200">
                                บันทึกข้อมูล
                            </button>
                            <button onclick="cancelEdit()" id="cancelBtn" class="hidden btn-bounce bg-slate-100 text-slate-500 font-semibold py-3.5 px-5 rounded-2xl hover:bg-slate-200">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="cute-glass p-6 rounded-[2rem]">
                    <h3 class="text-lg font-bold mb-2 text-indigo-500 text-center">สัดส่วนข้อมูล 🦋</h3>
                    <div class="h-44 relative"><canvas id="cuteChart"></canvas></div>
                </div>
            </div>

            <div class="lg:col-span-8 cute-glass p-6 rounded-[2rem] flex flex-col h-full">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 no-print">
                    <h3 class="text-xl font-bold text-indigo-800">สมุดรายชื่อบุคลากร 📖</h3>
                    <div class="relative w-full sm:w-auto">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-blue-300"></i>
                        <input type="text" id="searchInput" placeholder="ค้นหาชื่อ, ตำแหน่ง, เบอร์..." class="w-full sm:w-64 bg-white/60 border-2 border-blue-100 rounded-full pl-10 pr-4 py-2.5 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition text-slate-700">
                    </div>
                </div>
                
                <div class="overflow-x-auto flex-1 bg-white/40 rounded-2xl border border-blue-50 shadow-inner">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-blue-50/70 text-indigo-700">
                            <tr>
                                <th class="p-4 cursor-pointer hover:bg-blue-100/50 transition rounded-tl-2xl" onclick="sortData('name')">ชื่อ-นามสกุล <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 cursor-pointer hover:bg-blue-100/50 transition" onclick="sortData('position')">ตำแหน่ง & เงินเดือน <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 cursor-pointer hover:bg-blue-100/50 transition" onclick="sortData('email')">ติดต่อ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 cursor-pointer hover:bg-blue-100/50 transition" onclick="sortData('status')">สถานะ <i class="fa-solid fa-sort ml-1 text-xs opacity-50"></i></th>
                                <th class="p-4 text-center no-print rounded-tr-2xl">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-blue-100/50 text-slate-600">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataList = JSON.parse(localStorage.getItem('myBlueTable')) || [];
        let editingId = null;
        let chartInstance = null;
        let currentSort = { key: 'name', asc: true };

        function getStatusBadge(status) {
            if (status === 'Active') return `<span class="px-3 py-1.5 rounded-full bg-blue-100 text-blue-600 text-xs font-bold border border-blue-200">💙 Active</span>`;
            if (status === 'Pending') return `<span class="px-3 py-1.5 rounded-full bg-amber-100 text-amber-600 text-xs font-bold border border-amber-200">🌼 Pending</span>`;
            return `<span class="px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 text-xs font-bold border border-slate-200">☁️ Inactive</span>`;
        }

        // 1. ฟังก์ชัน Render หลัก
        function renderDashboard(searchTerm = '') {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            let filteredData = dataList.filter(data => 
                data.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                data.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
                data.phone.includes(searchTerm) ||
                data.position.toLowerCase().includes(searchTerm.toLowerCase())
            );

            filteredData.sort((a, b) => {
                let valA = a[currentSort.key] ? a[currentSort.key].toLowerCase() : '';
                let valB = b[currentSort.key] ? b[currentSort.key].toLowerCase() : '';
                
                // รองรับการจัดเรียงตัวเลขเงินเดือน
                if (currentSort.key === 'salary') {
                    valA = Number(a.salary); valB = Number(b.salary);
                }

                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });

            if (filteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-400 font-medium">ยังไม่มีข้อมูลเลยจ้า มาเพิ่มข้อมูลกันเถอะ! 🪻</td></tr>`;
            } else {
                filteredData.forEach(data => {
                    const formatSalary = data.salary ? Number(data.salary).toLocaleString('th-TH') + ' ฿' : '-';
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/60 transition group">
                            <td class="p-4 font-medium text-indigo-900">${data.name}</td>
                            <td class="p-4">
                                <div class="font-medium text-blue-600"><i class="fa-solid fa-briefcase text-blue-300 w-4"></i> ${data.position || '-'}</div>
                                <div class="text-sm text-slate-500 mt-1"><i class="fa-solid fa-coins text-yellow-400 w-4"></i> ${formatSalary}</div>
                            </td>
                            <td class="p-4 text-sm">
                                <div class="text-slate-600"><i class="fa-solid fa-envelope text-blue-300 w-4"></i> ${data.email}</div>
                                <div class="text-slate-500 mt-1"><i class="fa-solid fa-phone text-blue-300 w-4"></i> ${data.phone}</div>
                            </td>
                            <td class="p-4">${getStatusBadge(data.status)}</td>
                            <td class="p-4 text-center no-print">
                                <button onclick="editData(${data.id})" class="w-9 h-9 rounded-full bg-indigo-50 text-indigo-500 hover:bg-indigo-500 hover:text-white transition mx-1 shadow-sm"><i class="fa-solid fa-pen text-sm"></i></button>
                                <button onclick="deleteData(${data.id})" class="w-9 h-9 rounded-full bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition mx-1 shadow-sm"><i class="fa-solid fa-trash text-sm"></i></button>
                            </td>
                        </tr>`;
                });
            }
            updateStatsAndChart();
        }

        function sortData(key) {
            if (currentSort.key === key) currentSort.asc = !currentSort.asc; 
            else { currentSort.key = key; currentSort.asc = true; }
            renderDashboard(document.getElementById('searchInput').value);
        }

        function updateStatsAndChart() {
            let active = dataList.filter(d => d.status === 'Active').length;
            let pending = dataList.filter(d => d.status === 'Pending').length;
            let inactive = dataList.filter(d => d.status === 'Inactive').length;

            document.getElementById('statTotal').innerText = dataList.length;
            document.getElementById('statActive').innerText = active;
            document.getElementById('statInactive').innerText = pending + inactive;

            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('cuteChart').getContext('2d');
            
            const hasData = dataList.length > 0;
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Pending', 'Inactive'],
                    datasets: [{
                        data: hasData ? [active, pending, inactive] : [1],
                        backgroundColor: hasData ? ['#3b82f6', '#fbbf24', '#cbd5e1'] : ['#eff6ff'],
                        borderWidth: 3,
                        borderColor: '#ffffff',
                        hoverOffset: 5
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 15, font: { family: 'Kanit' }, color: '#475569' } },
                        tooltip: { enabled: hasData }
                    },
                    cutout: '65%'
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => renderDashboard(e.target.value));

        function saveData() {
            const name = document.getElementById('nameInput').value.trim();
            const position = document.getElementById('positionInput').value.trim();
            const salary = document.getElementById('salaryInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const status = document.getElementById('statusInput').value;

            if (!name || !email || !phone || !position || !salary) {
                return Swal.fire({ icon: 'warning', title: 'อุ๊ย!', text: 'กรอกข้อมูลให้ครบทุกช่องก่อนน้าา 🥺', confirmButtonColor: '#3b82f6', confirmButtonText: 'รับทราบจ้า' });
            }

            if (!editingId) {
                dataList.push({ id: Date.now(), name, position, salary, email, phone, status });
                toastAlert('เพิ่มข้อมูลเรียบร้อย! 🪻');
            } else {
                const index = dataList.findIndex(d => d.id === editingId);
                dataList[index] = { id: editingId, name, position, salary, email, phone, status };
                toastAlert('อัปเดตข้อมูลแล้วจ้า! 💠');
                cancelEdit();
            }
            saveAndRender();
        }

        function editData(id) {
            const data = dataList.find(d => d.id === id);
            editingId = id;
            document.getElementById('nameInput').value = data.name;
            document.getElementById('positionInput').value = data.position || '';
            document.getElementById('salaryInput').value = data.salary || '';
            document.getElementById('emailInput').value = data.email;
            document.getElementById('phoneInput').value = data.phone;
            document.getElementById('statusInput').value = data.status;
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen-nib mr-2"></i> แก้ไขข้อมูล';
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('saveBtn').innerHTML = 'อัปเดตเลย! 💙';
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('nameInput').value = '';
            document.getElementById('positionInput').value = '';
            document.getElementById('salaryInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('phoneInput').value = '';
            document.getElementById('statusInput').value = 'Active';
            
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-seedling mr-2"></i> เพิ่มข้อมูลใหม่ 🌿';
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('saveBtn').innerHTML = 'บันทึกข้อมูล';
        }

        function deleteData(id) {
            Swal.fire({
                title: 'แน่ใจน้า?', text: "ลบแล้วเอากลับมาไม่ได้แล้วนะ 🥺", icon: 'question',
                showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#94a3b8',
                confirmButtonText: 'ลบเลย!', cancelButtonText: 'เปลี่ยนใจ'
            }).then((result) => {
                if (result.isConfirmed) {
                    dataList = dataList.filter(d => d.id !== id);
                    if (editingId === id) cancelEdit();
                    saveAndRender();
                    toastAlert('ลบข้อมูลเรียบร้อย 🗑️');
                }
            })
        }

        function saveAndRender() {
            localStorage.setItem('myBlueTable', JSON.stringify(dataList));
            cancelEdit();
            renderDashboard(document.getElementById('searchInput').value);
        }

        const toastAlert = (title) => {
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: title, showConfirmButton: false, timer: 2000, iconColor: '#3b82f6', customClass: { title: 'text-blue-600 font-kanit' } });
        }

        function exportToCSV() {
            if (dataList.length === 0) return Swal.fire({ icon: 'info', title: 'ยังไม่มีข้อมูล', text: 'เพิ่มข้อมูลก่อนค่อยโหลดน้า ☁️', confirmButtonColor: '#3b82f6' });
            let csvContent = "\uFEFFชื่อ-นามสกุล,ตำแหน่ง,เงินเดือน,ช่องทางติดต่อ(อีเมล),เบอร์โทรศัพท์,สถานะ\n"; 
            dataList.forEach(row => {
                csvContent += `"${row.name}","${row.position || ''}","${row.salary || ''}","${row.email}","${row.phone}","${row.status}"\n`;
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
            link.download = "blue_data_list.csv";
            link.click();
        }

        renderDashboard();
    </script>
</body>
</html>
